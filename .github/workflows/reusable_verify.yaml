name: Lint & Test
on:
  workflow_call:
    inputs:
      lint:
        description: "Whether to enable linting"
        type: boolean
        default: true

      test:
        description: "Whether to enable testing"
        type: boolean
        default: true

      build:
        description: "Whether to enable building"
        type: boolean
        default: true

jobs:

  python-tests:
    if: ${{ inputs.test }}
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v8.0.0
      - name: pytest
        uses: yiogmbh/yio-actions/python/uv-tox@v2
        with:
          environment: py311

  python-lint:
    if: ${{ inputs.lint }}
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v8.0.0
      - name: pytest
        uses: yiogmbh/yio-actions/python/uv-tox@v2
        with:
          environment: ruff

  python-build:
    if: ${{ inputs.build }}
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v8.0.0
      - name: build
        uses: yiogmbh/yio-actions/python/uv-build@v2
      - name: verify
        run: |
          uv run --with dist/*.whl --no-project -- python -c "import aetpiref"

  docker-build:
    uses: docker/github-builder/.github/workflows/build.yml@v1
    permissions:
      contents: read # to fetch the repository content
      id-token: write # for signing attestation(s) with GitHub OIDC Token
    with:
      output: image
      push: false
      context: .
      file: ./docker-images/Dockerfile
      target: fastbpmn
      platforms: linux/amd64,linux/arm64
      #cache: true
      #cache-scope: myapp
      meta-images: |
         ghcr.io/yiogmbh/fastbpmn
      meta-tags: |
        type=sha
        # define default branch
        type=edge,branch=main
        type=sha,enable=true,prefix=,suffix=,format=short
      set-meta-labels: true
    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
