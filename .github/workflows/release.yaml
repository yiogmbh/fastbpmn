name: release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  cancel-in-progress: false
  group: release

jobs:
  # build and upload an artifact
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: setup uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: build
        run: |
          uv build

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: built-pypi-package
          path: dist

  # publish (to pypi)
  publish:
    name: Publish Python 🐍 distribution 📦 to TestPyPI
    if: false
    needs: build
    environment:
      name: pypi
      # Replace <package-name> with your PyPI project name
      url: https://pypi.org/p/fastbpmn
    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Download a single artifact
        uses: actions/download-artifact@v6
        with:
          name: built-pypi-package
          path: dist
      - name: Publish distribution 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # create github release
  release:
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Set the release version
        shell: bash
        run: echo "RELEASE_VERSION=${GITHUB_REF:11}" >> $GITHUB_ENV
      - name: setup uv
        uses: astral-sh/setup-uv@v8.0.0
      - name: setup git-cliff
        uses: taiki-e/install-action@git-cliff

      - id: release_body
        name: generate release content
        run: |
          echo "changes=$(git cliff --current --strip header)" >> $GITHUB_OUTPUT

      - name: download artifact
        uses: actions/download-artifact@v5
        with:
          name: built-pypi-package
          path: dist

      - name: Publish to GitHub
        uses: svenstaro/upload-release-action@29e53e917877a24fad85510ded594ab3c9ca12de # v2
        with:
          file: dist/*
          file_glob: true
          overwrite: true
          tag: ${{ github.ref }}
          release_name: "Release v${{ env.RELEASE_VERSION }}"
          body: "${{ steps.release_body.outputs.changes }}"
