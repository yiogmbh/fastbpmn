name: Update changelog
on:
  # Update changelog on every change
  push:
    branches:
      - main
    # probably not required, because if its updated already there might not be further commit
    #paths-ignore:
    #  - CHANGELOG.md

# let verification
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  chanelog:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      # Generate a temporary token for this run
      - name: Generate token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.RELEASE_TAGGER_APP_ID }}
          private-key: ${{ secrets.RELEASE_TAGGER_PRIVATE_KEY }}
      # Checkout the target repository
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: setup uv
        uses: astral-sh/setup-uv@v8.0.0
      - name: setup git-cliff
        uses: taiki-e/install-action@git-cliff

      - name: update changelog
        run: |
          git cliff > CHANGELOG.md

      - name: commit changelog
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add CHANGELOG.md
          git commit -m "chore(changelog): update changelog"
      - name: push if not up2date
        run: |
          git status -uno || git push
