name: Create / Trigger release
on:
  workflow_dispatch:

concurrency:
  cancel-in-progress: false
  group: prepare-release

jobs:
  # prepare new release
  # - compute new version (check if change)
  # - bump version (pyproject.toml)
  # - update changelog
  # - create tag
  # - commit + push tag (should finally trigger build and publish)
  prepare:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      # Generate a temporary token for this run
      - name: Generate token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.RELEASE_TAGGER_APP_ID }}
          private-key: ${{ secrets.RELEASE_TAGGER_PRIVATE_KEY }}
      # Checkout the target repository
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: setup uv
        uses: astral-sh/setup-uv@v8.0.0
      - name: setup git-cliff
        uses: taiki-e/install-action@git-cliff

      - name: checks
        id: checks
        uses: ./.github/actions/cliff-version

      - name: bump version (uv)
        if: ${{ steps.checks.outputs.requires_release }}
        run: |
          uv version "${{ steps.checks.outputs.bumped }}"

      - name: update changelog
        if: ${{ steps.checks.outputs.requires_release }}
        run: |
          git cliff --bump > CHANGELOG.md

      - name: commit & create tag
        if: ${{ steps.checks.outputs.requires_release }}
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add pyproject.toml CHANGELOG.md
          git commit -m "chore(release): prepare for ${{ steps.checks.outputs.bumped }}"
          git tag -a -m "${{ steps.checks.outputs.bumped }}" ${{ steps.checks.outputs.bumped }}
          git push --follow-tags
